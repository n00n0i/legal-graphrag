services:
  neo4j:
    image: neo4j:5.22.0
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/neo4j123
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data

  qdrant:
    image: qdrant/qdrant:v1.7.0
    ports: ["6333:6333", "6334:6334"]
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: neo4j123
      QDRANT_URL: http://qdrant:6333
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on: [neo4j, qdrant]

  user-portal:
    build: ./user-portal
    ports: ["3000:80"]
    depends_on: [backend]

  admin-portal:
    build: ./admin-portal
    ports: ["3001:80"]
    depends_on: [backend]

volumes:
  neo4j_data:
  qdrant_data:
